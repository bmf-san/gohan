name: Auto Assign

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-assign:
    name: Auto-assign PR author
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign author
        uses: kentaro-m/auto-assign-action@v2.0.2
        with:
          configuration-path: .github/auto_assign.yml
