version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - misspell
    - gocritic
    - unused
  settings:
    misspell:
      locale: US
    gocritic:
      enabled-checks:
        - nilValReturn
  exclusions:
    paths:
      - ".*_mock\\.go"
      - ".*\\.pb\\.go"
      - "testdata/.*"
    rules:
      - path: "_test\\.go"
        linters: [gocritic, errcheck]
      - path: "_test\\.go"
        linters: [staticcheck]
        text: "^QF"
      - text: 'Error return value of.*[.]Close.*is not checked'
        linters: [errcheck]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
